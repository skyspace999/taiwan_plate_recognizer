<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>車牌辨識</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#1a1a1a;--surface2:#242424;
  --border:rgba(255,255,255,0.1);--text:#f0f0f0;--text2:#666;
  --accent:#FFD60A;--accent2:#FF6B35;--success:#30D158;--danger:#FF453A;
  --header-h:44px;
  --cam-h:calc((100dvh - var(--header-h)) * 0.81);
  --shutter-h:calc((100dvh - var(--header-h)) * 0.19);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Display',sans-serif;overflow:hidden}

.app{display:flex;flex-direction:column;height:100dvh}

.header{height:var(--header-h);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--bg);border-bottom:0.5px solid var(--border)}
.header-title{font-size:15px;font-weight:600;letter-spacing:-0.3px;color:var(--text)}
.tab-bar{display:flex;gap:2px;background:var(--surface2);border-radius:8px;padding:2px}
.tab-btn{padding:4px 12px;border-radius:6px;font-size:12px;font-weight:500;border:none;cursor:pointer;background:transparent;color:var(--text2);font-family:inherit;transition:all 0.2s}
.tab-btn.active{background:var(--surface);color:var(--text)}

.view{display:none;flex:1;flex-direction:column;overflow:hidden}
.view.active{display:flex}

.cam-area{position:relative;height:var(--cam-h);flex-shrink:0;background:#000;overflow:hidden}
#video{width:100%;height:100%;object-fit:cover;display:block}
#canvas{display:none}

.cam-placeholder{width:100%;height:100%;background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer}
.cam-placeholder svg{opacity:0.3}
.cam-placeholder-text{font-size:13px;color:var(--text2)}
.cam-placeholder-hint{font-size:11px;color:var(--text2);opacity:0.5}

.bright-overlay{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.55);padding:5px 14px;display:none;align-items:center;gap:8px}
.bright-overlay.show{display:flex}
.bright-label{font-size:10px;color:#666;flex-shrink:0}
.bright-track{flex:1;height:2px;background:#222;border-radius:1px;overflow:hidden}
.bright-fill{height:100%;border-radius:1px;transition:width 0.3s,background 0.3s;width:0%}
.bright-val{font-size:10px;flex-shrink:0}

.progress-bar{height:2px;background:var(--surface2);flex-shrink:0}
.progress-fill{height:100%;background:var(--accent);transition:width 0.4s;width:0%}

.shutter-area{height:var(--shutter-h);flex-shrink:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;overflow:hidden}
.status-row{display:flex;align-items:center;gap:6px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--text2);flex-shrink:0}
.status-dot.scanning{background:var(--accent);animation:pulse 1s ease infinite}
.status-dot.success{background:var(--success)}
.status-dot.error{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.status-text{font-size:11px;color:var(--text2)}

.shutter-btn{border-radius:50%;border:3.5px solid #fff;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.1s;flex-shrink:0}
.shutter-btn:active{transform:scale(0.93)}
.shutter-inner{border-radius:50%;background:#fff;transition:all 0.15s}
.shutter-btn.scanning .shutter-inner{background:var(--accent)}

.usage-text{font-size:10px;color:var(--text2);opacity:0.5}

.zoom-controls{display:none;position:absolute;bottom:28px;left:50%;transform:translateX(-50%);align-items:center;gap:6px;z-index:5}
.zoom-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;border:0.5px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.45);color:#fff;cursor:pointer;font-family:inherit;transition:all 0.15s;backdrop-filter:blur(4px)}
.zoom-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}

.result-panel{position:absolute;left:0;right:0;bottom:0;background:var(--bg);border-top:0.5px solid var(--border);padding:14px 16px 20px;transform:translateY(100%);transition:transform 0.3s ease;z-index:10}
.result-panel.show{transform:translateY(0)}

.result-plate-label{font-size:10px;color:var(--text2);letter-spacing:0.8px;margin-bottom:6px}
.result-plate{font-size:32px;font-weight:700;letter-spacing:3px;font-family:'Courier New',monospace;color:var(--accent);margin-bottom:6px}
.result-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.meta-badge{background:var(--surface2);border-radius:5px;padding:2px 8px;font-size:11px;color:var(--text2)}

.candidates-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.candidate-chip{padding:3px 10px;border-radius:20px;font-size:11px;font-family:'Courier New',monospace;background:var(--surface2);border:0.5px solid var(--border);color:var(--text2);cursor:pointer}
.candidate-chip.selected{border-color:var(--accent);color:var(--accent);background:rgba(255,214,10,0.08)}

.note-block{background:var(--surface2);border-radius:10px;padding:10px 12px;margin-bottom:10px;cursor:pointer;border:0.5px solid transparent;transition:border-color 0.2s}
.note-block:active{border-color:var(--accent)}
.note-block-label{font-size:10px;color:var(--text2);margin-bottom:4px}
.note-block-text{font-size:13px;color:var(--text);line-height:1.5}
.note-block-hint{font-size:11px;color:var(--text2);opacity:0.5;font-style:italic}

.note-edit-area{display:none;flex-direction:column;gap:8px;margin-bottom:10px}
.note-edit-area.show{display:flex}
.note-input{background:var(--surface2);border:0.5px solid var(--accent);border-radius:10px;color:var(--text);font-size:13px;padding:10px 12px;resize:none;font-family:inherit;outline:none;width:100%}
.edit-btn-row{display:flex;gap:8px}
.btn{flex:1;padding:9px;border-radius:9px;border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--accent);color:#000}
.btn-cancel{background:var(--surface2);color:var(--text);border:0.5px solid var(--border)}

.panel-close-row{display:flex;justify-content:flex-end;margin-bottom:4px}
.panel-close{background:none;border:none;color:var(--text2);font-size:13px;cursor:pointer;padding:2px 4px;font-family:inherit}

.records-view{flex:1;display:flex;flex-direction:column;overflow:hidden}
.records-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.records-count{font-size:12px;color:var(--text2)}
.clear-btn{font-size:12px;color:var(--danger);background:none;border:none;cursor:pointer;font-family:inherit}
.record-list{flex:1;overflow-y:auto;padding:0 16px 20px;display:flex;flex-direction:column;gap:10px}
.record-item{background:var(--surface);border:0.5px solid var(--border);border-radius:14px;padding:12px 14px;display:flex;align-items:flex-start;gap:12px}
.record-plate-num{font-size:18px;font-weight:700;letter-spacing:2px;font-family:'Courier New',monospace;color:var(--accent);flex-shrink:0}
.record-info{flex:1;min-width:0}
.record-note{font-size:12px;color:var(--text2);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.record-note.has-note{color:var(--text)}
.record-date{font-size:10px;color:var(--text2);margin-top:3px;opacity:0.5}
.record-actions{display:flex;gap:5px}
.icon-btn{width:30px;height:30px;border-radius:8px;background:var(--surface2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-title{font-size:15px;font-weight:500;margin-bottom:5px;color:var(--text)}
.empty-desc{font-size:12px;line-height:1.5}

.toast{position:absolute;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:0.5px solid var(--border);border-radius:20px;padding:8px 18px;font-size:12px;color:var(--text);opacity:0;transition:all 0.25s;white-space:nowrap;pointer-events:none;z-index:99}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-title">車牌辨識</div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchView('camera')">相機</button>
      <button class="tab-btn" onclick="switchView('records')">記錄</button>
    </div>
  </div>

  <div id="view-camera" class="view active" style="position:relative">

    <div class="cam-area" id="cam-area">
      <div class="cam-placeholder" id="cam-placeholder" onclick="startCamera()">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <div class="cam-placeholder-text">點擊啟用相機</div>
        <div class="cam-placeholder-hint">需要授權相機權限</div>
      </div>
      <video id="video" autoplay playsinline muted style="display:none;width:100%;height:100%;object-fit:cover"></video>
      <canvas id="canvas" style="display:none"></canvas>
      <div class="bright-overlay" id="bright-overlay">
        <span class="bright-label">亮度</span>
        <div class="bright-track"><div class="bright-fill" id="bright-fill"></div></div>
        <span class="bright-val" id="bright-val" style="color:#666">—</span>
      </div>
      <div class="zoom-controls" id="zoom-controls">
        <button class="zoom-btn active" data-zoom="1" onclick="setZoom(1)">1×</button>
        <button class="zoom-btn" data-zoom="2" onclick="setZoom(2)">2×</button>
        <button class="zoom-btn" data-zoom="3" onclick="setZoom(3)">3×</button>
      </div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

    <div class="shutter-area" id="shutter-area">
      <div class="status-row">
        <div class="status-dot" id="status-dot"></div>
        <span class="status-text" id="status-text">點擊相機區域開始</span>
      </div>
      <button class="shutter-btn" id="shutter" onclick="capture()" style="width:0;height:0;opacity:0;pointer-events:none">
        <div class="shutter-inner"></div>
      </button>
      <div class="usage-text" id="usage-text" style="display:none">本月已用 0 / 2500 次</div>
    </div>

    <div class="result-panel" id="result-panel">
      <div class="panel-close-row">
        <button class="panel-close" onclick="closePanel()">關閉 ✕</button>
      </div>
      <div class="result-plate-label">辨識結果</div>
      <div class="result-plate" id="result-plate-num">—</div>
      <div class="result-meta" id="result-meta"></div>
      <div class="candidates-row" id="candidates-row" style="display:none"></div>

      <div class="note-block" id="note-block" onclick="startEditNote()">
        <div class="note-block-label">備註</div>
        <div id="note-content"></div>
      </div>

      <div class="note-edit-area" id="note-edit-area">
        <textarea class="note-input" id="note-input" rows="2" placeholder="輸入備註..."></textarea>
        <div class="edit-btn-row">
          <button class="btn btn-primary" onclick="saveNote()">儲存</button>
          <button class="btn btn-cancel" onclick="cancelEdit()">取消</button>
        </div>
      </div>
    </div>

  </div>

  <div id="view-records" class="view">
    <div class="records-view">
      <div class="records-header">
        <div class="records-count" id="records-count">共 0 筆記錄</div>
        <button class="clear-btn" onclick="clearAllRecords()">全部清除</button>
      </div>
      <div class="record-list" id="record-list"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
const API_TOKEN = 'ae6af9045e374a0c3daf4f71d839e37ad87d13a3';
const API_URL = 'https://api.platerecognizer.com/v1/plate-reader/';
const DB_KEY = 'tw_plate_notes_v4';

let db = {};
try { db = JSON.parse(localStorage.getItem(DB_KEY)||'{}'); } catch(e){}
let currentPlate = null;
let stream = null;
let brightInterval = null;
let isEditing = false;

function saveDB(){ try{ localStorage.setItem(DB_KEY, JSON.stringify(db)); }catch(e){} }

function showToast(msg, duration=2000){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), duration);
}

function switchView(v){
  document.getElementById('view-camera').classList.toggle('active', v==='camera');
  document.getElementById('view-records').classList.toggle('active', v==='records');
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',(i===0&&v==='camera')||(i===1&&v==='records'));
  });
  if(v==='records') renderRecords();
}

function setStatus(text, type=''){
  document.getElementById('status-text').textContent = text;
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot'+(type?' '+type:'');
}

async function startCamera(){
  document.getElementById('cam-placeholder').style.display='none';
  const video = document.getElementById('video');
  video.style.display='block';
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'environment', width:{ideal:1920}, height:{ideal:1080} }
    });
    video.srcObject = stream;
    document.getElementById('bright-overlay').classList.add('show');
    document.getElementById('zoom-controls').style.display='flex';
    const shutter = document.getElementById('shutter');
    shutter.style.width=''; shutter.style.height=''; shutter.style.opacity='1'; shutter.style.pointerEvents='';
    document.getElementById('usage-text').style.display='block';
    setStatus('就緒，按快門辨識車牌','success');
    startBrightnessMonitor();
    fetchUsage();
    applySizeToShutter();
  }catch(e){
    setStatus('無法取得相機權限','error');
  }
}

function applySizeToShutter(){
  const shutterArea = document.getElementById('shutter-area');
  const h = shutterArea.offsetHeight;
  const size = Math.round(Math.min(h * 0.62, 110));
  const inner = Math.round(size * 0.82);
  const shutter = document.getElementById('shutter');
  shutter.style.width = size+'px';
  shutter.style.height = size+'px';
  const innerEl = shutter.querySelector('.shutter-inner');
  innerEl.style.width = inner+'px';
  innerEl.style.height = inner+'px';
}

function startBrightnessMonitor(){
  const video = document.getElementById('video');
  const tmp = document.createElement('canvas');
  const ctx = tmp.getContext('2d');
  brightInterval = setInterval(()=>{
    if(video.videoWidth===0) return;
    tmp.width=80; tmp.height=45;
    ctx.drawImage(video,0,0,80,45);
    const d = ctx.getImageData(0,0,80,45).data;
    let sum=0;
    for(let i=0;i<d.length;i+=4) sum+=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
    const avg = Math.round(sum/(d.length/4));
    const pct = Math.round(avg/255*100);
    const fill = document.getElementById('bright-fill');
    const val = document.getElementById('bright-val');
    fill.style.width = pct+'%';
    if(avg<60){ fill.style.background='#FF453A'; val.style.color='#FF453A'; val.textContent='太暗'; }
    else if(avg<100){ fill.style.background='#FF9F0A'; val.style.color='#FF9F0A'; val.textContent='偏暗'; }
    else { fill.style.background='#30D158'; val.style.color='#30D158'; val.textContent='良好'; }
  },500);
}

async function fetchUsage(){
  try{
    const r = await fetch('https://api.platerecognizer.com/v1/statistics/',{headers:{'Authorization':'Token '+API_TOKEN}});
    const d = await r.json();
    if(d.usage){
      const calls = d.usage.calls;
      const total = d.total_calls || 2500;
      document.getElementById('usage-text').textContent=`本月已用 ${calls} / ${total} 次`;
    }
  }catch(e){}
}

async function setZoom(level){
  document.querySelectorAll('.zoom-btn').forEach(b=>{
    b.classList.toggle('active', parseFloat(b.dataset.zoom)===level);
  });
  try{
    const track = stream && stream.getVideoTracks()[0];
    if(!track) return;
    const caps = track.getCapabilities();
    if(caps.zoom){
      const max=caps.zoom.max;
      await track.applyConstraints({advanced:[{zoom: Math.min(level, max)}]});
    } else {
      const video = document.getElementById('video');
      video.style.transform = level>1 ? `scale(${level})` : '';
      video.style.transformOrigin = 'center center';
    }
  }catch(e){}
}

async function capture(){
  if(!stream){ showToast('請先啟用相機'); return; }
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  canvas.width=video.videoWidth; canvas.height=video.videoHeight;
  canvas.getContext('2d').drawImage(video,0,0);

  const shutter = document.getElementById('shutter');
  shutter.classList.add('scanning');
  setStatus('辨識中...','scanning');
  closePanel();

  let prog=0;
  const progEl = document.getElementById('progress');
  const timer = setInterval(()=>{ prog=Math.min(prog+7,85); progEl.style.width=prog+'%'; },150);

  try{
    const blob = await new Promise(res=>canvas.toBlob(res,'image/jpeg',0.92));
    const form = new FormData();
    form.append('upload', blob, 'plate.jpg');
    form.append('regions','tw');
    form.append('config', JSON.stringify({mode:'fast'}));
    const resp = await fetch(API_URL,{method:'POST',headers:{'Authorization':'Token '+API_TOKEN},body:form});
    clearInterval(timer);
    progEl.style.width='100%';
    setTimeout(()=>progEl.style.width='0%',600);
    shutter.classList.remove('scanning');
    if(!resp.ok){ setStatus(`API 錯誤 ${resp.status}`,'error'); return; }
    const data = await resp.json();
    if(!data.results||data.results.length===0){ setStatus('未偵測到車牌，請調整距離重試','error'); return; }
    showResult(data.results);
    await new Promise(r=>setTimeout(r,1500));
    await fetchUsage();
  }catch(e){
    clearInterval(timer);
    shutter.classList.remove('scanning');
    progEl.style.width='0%';
    setStatus('網路錯誤，請確認連線','error');
  }
}

function showResult(results){
  const best = results[0];
  const plate = best.plate.toUpperCase();
  currentPlate = plate;

  document.getElementById('result-plate-num').textContent = plate;

  const conf = Math.round((best.score||0)*100);
  const confColor = conf>=80?'#30D158':conf>=50?'#FF9F0A':'#FF453A';
  let meta = `<span class="meta-badge" style="color:${confColor}">信心度 ${conf}%</span>`;
  if(best.region&&best.region.code) meta+=`<span class="meta-badge">${best.region.code.toUpperCase()}</span>`;
  if(best.vehicle&&best.vehicle.type) meta+=`<span class="meta-badge">${best.vehicle.type}</span>`;
  document.getElementById('result-meta').innerHTML = meta;

  const candRow = document.getElementById('candidates-row');
  if(results.length>1){
    candRow.style.display='flex';
    candRow.innerHTML = results.map((r,i)=>{
      const p=r.plate.toUpperCase();
      return `<span class="candidate-chip${i===0?' selected':''}" onclick="pickCandidate('${p}',this)">${p}</span>`;
    }).join('');
  } else { candRow.style.display='none'; }

  if(!db[plate]) db[plate]={note:'',sightings:0,first:Date.now(),last:Date.now()};
  db[plate].sightings=(db[plate].sightings||0)+1;
  db[plate].last=Date.now();
  saveDB();

  renderNoteBlock(plate);
  document.getElementById('result-panel').classList.add('show');

  const hasNote = db[plate]&&db[plate].note;
  setStatus(hasNote?`辨識完成：${plate}（有備註）`:`辨識完成：${plate}`,'success');
}

function renderNoteBlock(plate){
  const noteContent = document.getElementById('note-content');
  const note = db[plate]&&db[plate].note ? db[plate].note : '';
  if(note){
    noteContent.innerHTML=`<div class="note-block-text">${note}</div>`;
  } else {
    noteContent.innerHTML=`<div class="note-block-hint">點擊新增備註</div>`;
  }
  cancelEdit();
}

function startEditNote(){
  if(isEditing) return;
  isEditing = true;
  const note = currentPlate&&db[currentPlate]?db[currentPlate].note||'':'';
  document.getElementById('note-input').value = note;
  document.getElementById('note-edit-area').classList.add('show');
  document.getElementById('note-input').focus();
}

function saveNote(){
  if(!currentPlate) return;
  const note = document.getElementById('note-input').value.trim();
  if(!db[currentPlate]) db[currentPlate]={sightings:1,first:Date.now()};
  db[currentPlate].note = note;
  db[currentPlate].last = Date.now();
  saveDB();
  showToast('✓ 備註已儲存');
  renderNoteBlock(currentPlate);
}

function cancelEdit(){
  isEditing = false;
  document.getElementById('note-edit-area').classList.remove('show');
}

function pickCandidate(plate, el){
  document.querySelectorAll('.candidate-chip').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  currentPlate = plate;
  document.getElementById('result-plate-num').textContent = plate;
  renderNoteBlock(plate);
}

function closePanel(){
  document.getElementById('result-panel').classList.remove('show');
  cancelEdit();
  currentPlate = null;
}

function renderRecords(){
  const list = document.getElementById('record-list');
  const keys = Object.keys(db).sort((a,b)=>(db[b].last||0)-(db[a].last||0));
  document.getElementById('records-count').textContent=`共 ${keys.length} 筆記錄`;
  if(keys.length===0){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">🚗</div><div class="empty-title">尚無記錄</div><div class="empty-desc">使用相機辨識車牌後<br>自動儲存到這裡</div></div>`;
    return;
  }
  list.innerHTML=keys.map(plate=>{
    const r=db[plate];
    const d=new Date(r.last||Date.now());
    const dateStr=`${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    const note=r.note||'';
    return `<div class="record-item">
      <div><div class="record-plate-num">${plate}</div><div class="record-date">${dateStr} · ${r.sightings||1} 次</div></div>
      <div class="record-info"><div class="record-note ${note?'has-note':''}">${note||'（無備註）'}</div></div>
      <div class="record-actions">
        <button class="icon-btn" onclick="editFromRecord('${plate}')">✏️</button>
        <button class="icon-btn" onclick="deleteFromList('${plate}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function editFromRecord(plate){
  switchView('camera');
  setTimeout(()=>{
    currentPlate=plate;
    document.getElementById('result-plate-num').textContent=plate;
    document.getElementById('result-meta').innerHTML='';
    document.getElementById('candidates-row').style.display='none';
    renderNoteBlock(plate);
    document.getElementById('result-panel').classList.add('show');
    setStatus(`編輯：${plate}`,'success');
  },100);
}

function deleteFromList(plate){
  if(!confirm(`確定要刪除 ${plate} 的記錄？`)) return;
  delete db[plate]; saveDB(); renderRecords(); showToast('已刪除');
}

function clearAllRecords(){
  if(Object.keys(db).length===0){ showToast('沒有記錄'); return; }
  if(!confirm('確定要清除所有記錄？')) return;
  db={}; saveDB(); renderRecords(); showToast('已清除所有記錄');
}
</script>
</body>
</html>
