<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>車牌辨識 v2</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#1a1a1a;--surface2:#242424;
  --border:rgba(255,255,255,0.1);--text:#f0f0f0;--text2:#888;
  --accent:#FFD60A;--accent2:#FF6B35;--success:#30D158;--danger:#FF453A;
  --radius:16px;--radius-sm:10px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Display',sans-serif;min-height:100vh;overflow-x:hidden}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:0.5px solid var(--border)}
.header-title{font-size:18px;font-weight:600;letter-spacing:-0.3px}
.header-sub{font-size:11px;color:var(--text2);margin-top:2px}
.tab-bar{display:flex;gap:4px;background:var(--surface2);border-radius:var(--radius-sm);padding:3px}
.tab-btn{padding:5px 14px;border-radius:8px;font-size:13px;font-weight:500;border:none;cursor:pointer;background:transparent;color:var(--text2);transition:all 0.2s;font-family:inherit}
.tab-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.3)}
.view{display:none}.view.active{display:block}

.cam-placeholder{width:100%;aspect-ratio:16/10;background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text2);font-size:14px;cursor:pointer}
.cam-placeholder-icon{font-size:48px}
.camera-container{position:relative;width:100%;background:#000;aspect-ratio:16/10;overflow:hidden}
#video{width:100%;height:100%;object-fit:cover;display:block}
#canvas{display:none}

.scan-overlay{position:absolute;inset:0;pointer-events:none}
.scan-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:82%;height:52px;border:2px solid var(--accent);border-radius:8px;box-shadow:0 0 0 2000px rgba(0,0,0,0.5)}
.scan-label{position:absolute;top:calc(50% + 38px);left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,0.7);white-space:nowrap}
.scan-line{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scanMove 2s ease-in-out infinite}
@keyframes scanMove{0%{top:0;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}

.brightness-bar{padding:8px 20px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text2)}
.bright-track{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.bright-fill{height:100%;border-radius:2px;transition:width 0.3s,background 0.3s;width:0%}

.progress-bar{width:100%;height:3px;background:var(--surface2)}
.progress-fill{height:100%;background:var(--accent);transition:width 0.3s;width:0%}

.status-bar{display:flex;align-items:center;gap:8px;padding:10px 20px;font-size:13px;color:var(--text2);min-height:40px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--text2);flex-shrink:0}
.status-dot.scanning{background:var(--accent);animation:pulse 1s ease infinite}
.status-dot.success{background:var(--success)}
.status-dot.error{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

.result-card{margin:0 20px 16px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;display:none;animation:slideUp 0.3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.result-card.show{display:block}
.result-plate-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px}
.result-plate{font-size:34px;font-weight:700;letter-spacing:3px;font-family:'Courier New',monospace;color:var(--accent);margin-bottom:4px}
.result-confidence{font-size:12px;color:var(--text2);margin-bottom:12px}
.conf-bar{display:inline-block;width:60px;height:4px;background:var(--surface2);border-radius:2px;vertical-align:middle;margin-left:6px;overflow:hidden}
.conf-fill{height:100%;border-radius:2px;transition:width 0.4s}

.note-alert{display:none;align-items:center;gap:6px;background:rgba(255,107,53,0.12);border:0.5px solid rgba(255,107,53,0.3);color:var(--accent2);font-size:13px;padding:8px 12px;border-radius:20px;margin-bottom:12px;width:100%}
.note-display{font-size:14px;line-height:1.5;color:var(--text);background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:12px;display:none}
.note-input{background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;padding:10px 12px;resize:none;font-family:inherit;outline:none;transition:border-color 0.2s;width:100%;margin-top:4px}
.note-input:focus{border-color:var(--accent)}
.btn-row{display:flex;gap:8px;margin-top:8px}
.btn{flex:1;padding:10px;border-radius:var(--radius-sm);border:none;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:inherit}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--accent);color:#000}
.btn-secondary{background:var(--surface2);color:var(--text);border:0.5px solid var(--border)}
.btn-danger{background:rgba(255,69,58,0.15);color:var(--danger);border:0.5px solid rgba(255,69,58,0.2);width:100%;margin-top:8px}

.cam-controls{padding:16px 20px;display:flex;flex-direction:column;align-items:center;gap:12px}
.shutter-btn{width:72px;height:72px;border-radius:50%;border:3px solid #fff;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.1s}
.shutter-btn:active{transform:scale(0.94)}
.shutter-inner{width:56px;height:56px;border-radius:50%;background:#fff;transition:all 0.15s}
.shutter-btn:active .shutter-inner{transform:scale(0.88)}
.shutter-btn.scanning .shutter-inner{background:var(--accent)}
.shutter-hint{font-size:13px;color:var(--text2);text-align:center}

.debug-panel{margin:0 20px 12px;background:var(--surface2);border-radius:var(--radius-sm);padding:12px;font-size:12px;color:var(--text2);display:none}
.debug-panel.show{display:block}
.debug-title{font-size:11px;font-weight:500;color:var(--text);margin-bottom:8px;letter-spacing:0.5px}
.debug-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:0.5px solid var(--border)}
.debug-row:last-child{border-bottom:none}
.debug-val{color:var(--text);font-family:'Courier New',monospace}

.records-header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between}
.records-count{font-size:13px;color:var(--text2)}
.clear-btn{font-size:12px;color:var(--danger);background:none;border:none;cursor:pointer;padding:4px 8px;font-family:inherit}
.record-list{padding:0 20px 80px;display:flex;flex-direction:column;gap:10px}
.record-item{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:flex-start;gap:14px;animation:slideUp 0.25s ease}
.record-plate-num{font-size:20px;font-weight:700;letter-spacing:2px;font-family:'Courier New',monospace;color:var(--accent);flex-shrink:0}
.record-info{flex:1;min-width:0}
.record-note{font-size:13px;color:var(--text2);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.record-note.has-note{color:var(--text)}
.record-date{font-size:11px;color:var(--text2);margin-top:4px;opacity:0.6}
.record-actions{display:flex;gap:6px;flex-shrink:0}
.icon-btn{width:32px;height:32px;border-radius:8px;background:var(--surface2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background 0.15s}
.icon-btn:active{background:var(--border)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:500;margin-bottom:6px;color:var(--text)}
.empty-desc{font-size:13px;line-height:1.5}

.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:0.5px solid var(--border);border-radius:24px;padding:10px 20px;font-size:13px;color:var(--text);opacity:0;transition:all 0.3s;white-space:nowrap;pointer-events:none;z-index:99;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.candidates-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.candidate-chip{padding:4px 10px;border-radius:20px;font-size:12px;font-family:'Courier New',monospace;background:var(--surface2);border:0.5px solid var(--border);color:var(--text2);cursor:pointer;transition:all 0.15s}
.candidate-chip:hover{border-color:var(--accent);color:var(--accent)}
.candidate-chip.selected{background:rgba(255,214,10,0.1);border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">車牌辨識</div>
    <div class="header-sub">台灣車牌 · 強化版 v2</div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchView('camera')">相機</button>
    <button class="tab-btn" onclick="switchView('records')">記錄</button>
  </div>
</div>

<div id="view-camera" class="view active">

  <div id="cam-placeholder" class="cam-placeholder" onclick="startCamera()">
    <div class="cam-placeholder-icon">📷</div>
    <div>點擊啟用相機</div>
    <div style="font-size:12px;opacity:0.6">需要授權相機權限</div>
  </div>

  <div id="cam-live" style="display:none">
    <div class="camera-container">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="scan-overlay">
        <div class="scan-frame"><div class="scan-line"></div></div>
        <div class="scan-label">將車牌對準黃色框內</div>
      </div>
    </div>
    <div class="brightness-bar">
      <span>亮度</span>
      <div class="bright-track"><div class="bright-fill" id="bright-fill"></div></div>
      <span id="bright-val">—</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">點擊相機區域開始</span>
  </div>

  <div id="result-card" class="result-card">
    <div class="result-plate-label">辨識結果</div>
    <div class="result-plate" id="result-plate-num">—</div>
    <div class="result-confidence" id="result-conf"></div>

    <div id="candidates-section" style="display:none;margin-bottom:12px">
      <div style="font-size:11px;color:var(--text2);margin-bottom:6px">其他候選（點選切換）</div>
      <div class="candidates-row" id="candidates-row"></div>
    </div>

    <div id="note-alert" class="note-alert"></div>
    <div id="note-display" class="note-display"></div>
    <textarea id="note-input" class="note-input" rows="2" placeholder="輸入備註（下次見到此車牌時顯示）"></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" id="save-btn" onclick="saveNote()">儲存備註</button>
      <button class="btn btn-secondary" onclick="clearResult()">清除</button>
    </div>
    <button class="btn btn-danger" id="delete-btn" style="display:none" onclick="deleteRecord()">刪除此車牌記錄</button>
  </div>

  <div id="debug-panel" class="debug-panel">
    <div class="debug-title">辨識詳細資訊</div>
    <div id="debug-content"></div>
  </div>

  <div class="cam-controls" id="cam-ctrl" style="display:none">
    <button class="shutter-btn" id="shutter" onclick="capture()">
      <div class="shutter-inner"></div>
    </button>
    <div class="shutter-hint">按下快門辨識車牌</div>
  </div>

</div>

<div id="view-records" class="view">
  <div class="records-header">
    <div class="records-count" id="records-count">共 0 筆記錄</div>
    <button class="clear-btn" onclick="clearAllRecords()">全部清除</button>
  </div>
  <div class="record-list" id="record-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const DB_KEY = 'tw_plate_notes_v2';
let db = {};
try { db = JSON.parse(localStorage.getItem(DB_KEY) || '{}'); } catch(e) {}
let currentPlate = null;
let stream = null;
let worker = null;
let workerReady = false;
let brightInterval = null;
let allCandidates = [];

function saveDB(){ try{ localStorage.setItem(DB_KEY, JSON.stringify(db)); }catch(e){} }

function showToast(msg, duration=2000){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), duration);
}

function switchView(v){
  document.getElementById('view-camera').classList.toggle('active', v==='camera');
  document.getElementById('view-records').classList.toggle('active', v==='records');
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',(i===0&&v==='camera')||(i===1&&v==='records'));
  });
  if(v==='records') renderRecords();
}

function setStatus(text, type=''){
  document.getElementById('status-text').textContent = text;
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot'+(type?' '+type:'');
}

async function initWorker(){
  if(worker) return;
  setStatus('正在載入 OCR 引擎...','scanning');
  try{
    worker = await Tesseract.createWorker('eng', 1, {
      logger: m => {
        if(m.status==='recognizing text'){
          document.getElementById('progress').style.width = (m.progress*100).toFixed(0)+'%';
        }
      }
    });
    await worker.setParameters({
      tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789',
      preserve_interword_spaces: '0',
      tessedit_pageseg_mode: '7',
    });
    workerReady = true;
    setStatus('就緒，按快門辨識車牌','success');
  }catch(e){
    setStatus('OCR 引擎載入失敗','error');
  }
}

async function startCamera(){
  document.getElementById('cam-placeholder').style.display='none';
  document.getElementById('cam-live').style.display='block';
  document.getElementById('cam-ctrl').style.display='flex';
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'environment', width:{ideal:1920}, height:{ideal:1080} }
    });
    document.getElementById('video').srcObject = stream;
    setStatus('相機已啟動','success');
    startBrightnessMonitor();
  }catch(e){
    setStatus('無法取得相機權限','error');
  }
  initWorker();
}

function startBrightnessMonitor(){
  const video = document.getElementById('video');
  const tmpCanvas = document.createElement('canvas');
  const tmpCtx = tmpCanvas.getContext('2d');
  brightInterval = setInterval(()=>{
    if(video.videoWidth===0) return;
    tmpCanvas.width=80; tmpCanvas.height=45;
    tmpCtx.drawImage(video,0,0,80,45);
    const d = tmpCtx.getImageData(0,0,80,45).data;
    let sum=0;
    for(let i=0;i<d.length;i+=4) sum+=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
    const avg = Math.round(sum/(d.length/4));
    const pct = Math.round(avg/255*100);
    document.getElementById('bright-fill').style.width = pct+'%';
    document.getElementById('bright-fill').style.background =
      avg<60 ? '#FF453A' : avg<100 ? '#FF9F0A' : '#30D158';
    document.getElementById('bright-val').textContent = avg<60?'太暗':avg<100?'偏暗':'良好';
  },500);
}

function preprocessImage(sourceCanvas, mode){
  const w = sourceCanvas.width, h = sourceCanvas.height;
  const out = document.createElement('canvas');
  const scale = 3;
  out.width = w*scale; out.height = h*scale;
  const ctx = out.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(sourceCanvas, 0, 0, out.width, out.height);

  const imgData = ctx.getImageData(0,0,out.width,out.height);
  const data = imgData.data;

  if(mode==='binary'){
    for(let i=0;i<data.length;i+=4){
      const gray = 0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];
      const v = gray>127?255:0;
      data[i]=data[i+1]=data[i+2]=v;
    }
  } else if(mode==='invert'){
    for(let i=0;i<data.length;i+=4){
      const gray = 0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];
      const v = gray>127?0:255;
      data[i]=data[i+1]=data[i+2]=v;
    }
  } else if(mode==='contrast'){
    for(let i=0;i<data.length;i+=4){
      const gray = 0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];
      const c = Math.min(255, Math.max(0, (gray-128)*2.5+128));
      data[i]=data[i+1]=data[i+2]=c;
    }
  }
  ctx.putImageData(imgData,0,0);
  return out;
}

function cropToPlateArea(sourceCanvas){
  const w=sourceCanvas.width, h=sourceCanvas.height;
  const cropX=w*0.08, cropY=h*0.28, cropW=w*0.84, cropH=h*0.44;
  const out=document.createElement('canvas');
  out.width=cropW; out.height=cropH;
  out.getContext('2d').drawImage(sourceCanvas,cropX,cropY,cropW,cropH,0,0,cropW,cropH);
  return out;
}

const TW_PATTERNS = [
  /^[A-Z]{3}[0-9]{4}$/,
  /^[A-Z]{2}[0-9]{4}$/,
  /^[A-Z]{2}[0-9]{3}$/,
  /^[0-9]{4}[A-Z]{2}$/,
  /^[0-9]{3}[A-Z]{2}$/,
  /^[A-Z][0-9]{4}[A-Z]$/,
  /^[A-Z][0-9]{3}[A-Z]{2}$/,
  /^[A-Z]{2}[0-9]{2}[A-Z]{2}$/,
];

function formatPlate(raw){
  if(raw.length>=5 && raw.length<=7){
    const letters = raw.match(/[A-Z]+/g)||[];
    const digits = raw.match(/[0-9]+/g)||[];
    if(letters.length>0 && digits.length>0){
      return letters[0]+'-'+digits[0];
    }
  }
  return raw;
}

function extractCandidates(text){
  const cleaned = text.toUpperCase().replace(/[^A-Z0-9\n ]/g,'');
  const tokens = cleaned.split(/[\n\s]+/).filter(t=>t.length>=4&&t.length<=8);
  const scored = [];
  for(const tok of tokens){
    for(const pat of TW_PATTERNS){
      if(pat.test(tok)){
        scored.push({raw:tok, formatted:formatPlate(tok), score:10});
        break;
      }
    }
    if(tok.length>=5&&tok.length<=7){
      const lc=((tok.match(/[A-Z]/g)||[]).length);
      const dc=((tok.match(/[0-9]/g)||[]).length);
      if(lc>=1&&dc>=2){
        const already = scored.find(s=>s.raw===tok);
        if(!already) scored.push({raw:tok,formatted:formatPlate(tok),score:lc+dc});
      }
    }
  }
  scored.sort((a,b)=>b.score-a.score);
  const seen=new Set();
  return scored.filter(s=>{
    if(seen.has(s.formatted)) return false;
    seen.add(s.formatted);
    return true;
  }).slice(0,4);
}

async function recognizeWithMode(cropCanvas, mode){
  const processed = preprocessImage(cropCanvas, mode);
  const {data} = await worker.recognize(processed);
  const candidates = extractCandidates(data.text);
  return {candidates, confidence:data.confidence, raw:data.text, mode};
}

async function capture(){
  if(!stream){ showToast('請先啟用相機'); return; }
  if(!workerReady){ showToast('OCR 引擎尚未就緒，請稍候'); return; }

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video,0,0);

  const cropCanvas = cropToPlateArea(canvas);

  const shutter = document.getElementById('shutter');
  shutter.classList.add('scanning');
  setStatus('辨識中（多模式）...','scanning');
  document.getElementById('progress').style.width='0%';
  clearResult();

  try{
    const modes = ['contrast','binary','invert'];
    const results = await Promise.all(modes.map(m=>recognizeWithMode(cropCanvas,m)));

    document.getElementById('progress').style.width='100%';
    setTimeout(()=>document.getElementById('progress').style.width='0%',800);
    shutter.classList.remove('scanning');

    const allCands = [];
    const seen = new Set();
    for(const r of results){
      for(const c of r.candidates){
        if(!seen.has(c.formatted)){
          seen.add(c.formatted);
          allCands.push({...c, confidence:r.confidence});
        }
      }
    }

    const debugRows = results.map(r=>
      `<div class="debug-row"><span>${r.mode}</span><span class="debug-val">${r.candidates.map(c=>c.formatted).join(', ')||'未辨識'}</span></div>`
    ).join('');
    document.getElementById('debug-content').innerHTML = debugRows;
    document.getElementById('debug-panel').classList.add('show');

    if(allCands.length===0){
      setStatus('未辨識到車牌格式，請調整角度重試','error');
      return;
    }

    allCandidates = allCands;
    selectCandidate(allCands[0], allCands);

  }catch(e){
    shutter.classList.remove('scanning');
    setStatus('辨識失敗，請重試','error');
  }
}

function selectCandidate(cand, all){
  currentPlate = cand.formatted;
  document.getElementById('result-plate-num').textContent = cand.formatted;

  const confPct = Math.round(cand.confidence||0);
  const confColor = confPct>=70?'#30D158':confPct>=40?'#FF9F0A':'#FF453A';
  document.getElementById('result-conf').innerHTML =
    `信心度 <span class="conf-bar"><span class="conf-fill" style="width:${confPct}%;background:${confColor}"></span></span> ${confPct}%`;

  if(all && all.length>1){
    const row = document.getElementById('candidates-row');
    row.innerHTML = all.map((c,i)=>
      `<span class="candidate-chip${i===0?' selected':''}" onclick="pickCandidate('${c.formatted}',this)">${c.formatted}</span>`
    ).join('');
    document.getElementById('candidates-section').style.display='block';
  } else {
    document.getElementById('candidates-section').style.display='none';
  }

  populateNoteArea(cand.formatted);
  document.getElementById('result-card').classList.add('show');

  if(db[cand.formatted]){
    setStatus(`辨識完成：${cand.formatted}（有備註）`,'success');
  } else {
    setStatus(`辨識完成：${cand.formatted}`,'success');
  }

  if(!db[cand.formatted]) db[cand.formatted]={note:'',sightings:0,first:Date.now(),last:Date.now()};
  db[cand.formatted].sightings=(db[cand.formatted].sightings||0)+1;
  db[cand.formatted].last=Date.now();
  saveDB();
}

function pickCandidate(plate, el){
  document.querySelectorAll('.candidate-chip').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  currentPlate = plate;
  document.getElementById('result-plate-num').textContent = plate;
  populateNoteArea(plate);
}

function populateNoteArea(plate){
  const noteAlert = document.getElementById('note-alert');
  const noteDisplay = document.getElementById('note-display');
  const noteInput = document.getElementById('note-input');
  const deleteBtn = document.getElementById('delete-btn');
  const saveBtn = document.getElementById('save-btn');

  if(db[plate]&&db[plate].note){
    noteAlert.style.display='flex';
    noteAlert.textContent='⚠️ 此車牌有備註';
    noteDisplay.style.display='block';
    noteDisplay.textContent=db[plate].note;
    noteInput.value=db[plate].note;
    saveBtn.textContent='更新備註';
    deleteBtn.style.display='block';
  } else {
    noteAlert.style.display='none';
    noteDisplay.style.display='none';
    noteInput.value='';
    saveBtn.textContent='儲存備註';
    deleteBtn.style.display='block';
  }
}

function saveNote(){
  if(!currentPlate) return;
  const note=document.getElementById('note-input').value.trim();
  if(!db[currentPlate]) db[currentPlate]={sightings:1,first:Date.now()};
  db[currentPlate].note=note;
  db[currentPlate].last=Date.now();
  saveDB();
  showToast('✓ 備註已儲存');
  populateNoteArea(currentPlate);
}

function deleteRecord(){
  if(!currentPlate) return;
  if(!confirm(`確定要刪除 ${currentPlate} 的所有記錄？`)) return;
  delete db[currentPlate];
  saveDB();
  clearResult();
  showToast('已刪除記錄');
}

function clearResult(){
  document.getElementById('result-card').classList.remove('show');
  document.getElementById('debug-panel').classList.remove('show');
  currentPlate=null;
  allCandidates=[];
}

function renderRecords(){
  const list=document.getElementById('record-list');
  const keys=Object.keys(db).sort((a,b)=>(db[b].last||0)-(db[a].last||0));
  document.getElementById('records-count').textContent=`共 ${keys.length} 筆記錄`;
  if(keys.length===0){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">🚗</div><div class="empty-title">尚無記錄</div><div class="empty-desc">使用相機辨識車牌後，<br>自動儲存到這裡</div></div>`;
    return;
  }
  list.innerHTML=keys.map(plate=>{
    const r=db[plate];
    const d=r.last?new Date(r.last):new Date();
    const dateStr=`${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    const note=r.note||'';
    return `<div class="record-item">
      <div>
        <div class="record-plate-num">${plate}</div>
        <div class="record-date">${dateStr} · 出現 ${r.sightings||1} 次</div>
      </div>
      <div class="record-info">
        <div class="record-note ${note?'has-note':''}">${note||'（無備註）'}</div>
      </div>
      <div class="record-actions">
        <button class="icon-btn" onclick="editFromRecord('${plate}')" title="編輯">✏️</button>
        <button class="icon-btn" onclick="deleteFromList('${plate}')" title="刪除">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function editFromRecord(plate){
  switchView('camera');
  setTimeout(()=>{
    currentPlate=plate;
    document.getElementById('result-plate-num').textContent=plate;
    document.getElementById('result-conf').textContent='';
    document.getElementById('candidates-section').style.display='none';
    populateNoteArea(plate);
    document.getElementById('result-card').classList.add('show');
    setStatus(`編輯：${plate}`,'success');
  },100);
}

function deleteFromList(plate){
  if(!confirm(`確定要刪除 ${plate} 的記錄？`)) return;
  delete db[plate];
  saveDB();
  renderRecords();
  showToast('已刪除');
}

function clearAllRecords(){
  if(Object.keys(db).length===0){ showToast('沒有記錄'); return; }
  if(!confirm('確定要清除所有記錄？此操作無法復原')) return;
  db={};
  saveDB();
  renderRecords();
  showToast('已清除所有記錄');
}
</script>
</body>
</html>
