<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>車牌辨識</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.1);
    --text: #f0f0f0;
    --text2: #888;
    --accent: #FFD60A;
    --accent2: #FF6B35;
    --success: #30D158;
    --danger: #FF453A;
    --radius: 16px;
    --radius-sm: 10px;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Display', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 0.5px solid var(--border);
  }
  .header-title {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .header-subtitle {
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
  }
  .tab-bar {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 3px;
  }
  .tab-btn {
    padding: 5px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    background: transparent;
    color: var(--text2);
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* ===== CAMERA VIEW ===== */
  .camera-container {
    position: relative;
    width: 100%;
    background: #000;
    aspect-ratio: 16/10;
    overflow: hidden;
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  #canvas { display: none; }
  .scan-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .scan-frame {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 80%;
    height: 50px;
    border: 2px solid var(--accent);
    border-radius: 8px;
    box-shadow: 0 0 0 2000px rgba(0,0,0,0.45);
  }
  .scan-label {
    position: absolute;
    top: calc(50% + 36px);
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    white-space: nowrap;
  }
  .scan-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanMove 2s ease-in-out infinite;
  }
  @keyframes scanMove {
    0% { top: 0; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }

  .cam-controls {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
  }

  .shutter-btn {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 3px solid #fff;
    background: transparent;
    cursor: pointer;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s;
  }
  .shutter-btn:active { transform: scale(0.94); }
  .shutter-inner {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: #fff;
    transition: all 0.15s;
  }
  .shutter-btn:active .shutter-inner { transform: scale(0.88); }
  .shutter-btn.scanning .shutter-inner { background: var(--accent); }
  .shutter-hint {
    font-size: 13px;
    color: var(--text2);
    text-align: center;
  }

  /* RESULT CARD */
  .result-card {
    margin: 0 20px 16px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: none;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .result-card.show { display: block; }
  .result-plate-label {
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .result-plate {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: 3px;
    font-family: 'Courier New', monospace;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .result-note-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255, 69, 58, 0.15);
    border: 0.5px solid rgba(255, 69, 58, 0.3);
    color: var(--danger);
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
    width: 100%;
  }
  .result-note-badge.has-note {
    background: rgba(255, 107, 53, 0.12);
    border-color: rgba(255, 107, 53, 0.3);
    color: var(--accent2);
  }
  .note-text-display {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    margin-bottom: 12px;
    display: none;
  }
  .note-input-area {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }
  .note-input {
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    padding: 10px 12px;
    resize: none;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    display: none;
  }
  .note-input:focus { border-color: var(--accent); }
  .btn-row { display: flex; gap: 8px; }
  .btn {
    flex: 1;
    padding: 10px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 0.5px solid var(--border); }
  .btn-danger { background: rgba(255,69,58,0.15); color: var(--danger); border: 0.5px solid rgba(255,69,58,0.2); }

  /* STATUS */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text2);
    min-height: 40px;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text2);
    flex-shrink: 0;
  }
  .status-dot.scanning { background: var(--accent); animation: pulse 1s ease infinite; }
  .status-dot.success { background: var(--success); }
  .status-dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ===== RECORDS VIEW ===== */
  .records-header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .records-count {
    font-size: 13px;
    color: var(--text2);
  }
  .clear-btn {
    font-size: 12px;
    color: var(--danger);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    font-family: inherit;
  }
  .record-list {
    padding: 0 20px 80px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .record-item {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    animation: slideUp 0.25s ease;
  }
  .record-plate-num {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 2px;
    font-family: 'Courier New', monospace;
    color: var(--accent);
    flex-shrink: 0;
  }
  .record-info { flex: 1; min-width: 0; }
  .record-note {
    font-size: 13px;
    color: var(--text2);
    margin-top: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .record-note.has-note { color: var(--text); }
  .record-date {
    font-size: 11px;
    color: var(--text2);
    margin-top: 4px;
    opacity: 0.6;
  }
  .record-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--surface2);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    transition: background 0.15s;
  }
  .icon-btn:active { background: var(--border); }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
  .empty-desc { font-size: 13px; line-height: 1.5; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 24px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
    pointer-events: none;
    z-index: 99;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* CAM not started */
  .cam-placeholder {
    width: 100%;
    aspect-ratio: 16/10;
    background: var(--surface2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text2);
    font-size: 14px;
    cursor: pointer;
  }
  .cam-placeholder-icon { font-size: 48px; }
  .progress-bar {
    width: 100%;
    height: 3px;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
    width: 0%;
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">車牌辨識</div>
    <div class="header-subtitle">台灣車牌 · 個人記錄</div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchView('camera')">相機</button>
    <button class="tab-btn" onclick="switchView('records')">記錄</button>
  </div>
</div>

<!-- CAMERA VIEW -->
<div id="view-camera" class="view active">

  <div id="cam-placeholder" class="cam-placeholder" onclick="startCamera()">
    <div class="cam-placeholder-icon">📷</div>
    <div>點擊啟用相機</div>
    <div style="font-size:12px;opacity:0.6">需要授權相機權限</div>
  </div>

  <div id="cam-live" style="display:none">
    <div class="camera-container">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="scan-overlay">
        <div class="scan-frame">
          <div class="scan-line"></div>
        </div>
        <div class="scan-label">將車牌對準框內</div>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">點擊相機區域開始</span>
  </div>

  <div id="result-card" class="result-card">
    <div class="result-plate-label">辨識結果</div>
    <div class="result-plate" id="result-plate-num">—</div>
    <div id="note-alert" class="result-note-badge" style="display:none"></div>
    <div id="note-display" class="note-text-display"></div>
    <div class="note-input-area">
      <textarea id="note-input" class="note-input" rows="2" placeholder="輸入備註（下次見到此車牌時顯示）"></textarea>
      <div class="btn-row">
        <button class="btn btn-primary" id="save-btn" onclick="saveNote()">儲存備註</button>
        <button class="btn btn-secondary" onclick="clearResult()">清除</button>
      </div>
      <button class="btn btn-danger" id="delete-btn" style="display:none" onclick="deleteRecord()">刪除此車牌記錄</button>
    </div>
  </div>

  <div class="cam-controls" id="cam-ctrl" style="display:none">
    <button class="shutter-btn" id="shutter" onclick="capture()">
      <div class="shutter-inner"></div>
    </button>
    <div class="shutter-hint">按下快門辨識車牌</div>
  </div>

</div>

<!-- RECORDS VIEW -->
<div id="view-records" class="view">
  <div class="records-header">
    <div class="records-count" id="records-count">共 0 筆記錄</div>
    <button class="clear-btn" onclick="clearAllRecords()">全部清除</button>
  </div>
  <div class="record-list" id="record-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const DB_KEY = 'tw_plate_notes_v1';
let db = JSON.parse(localStorage.getItem(DB_KEY) || '{}');
let currentPlate = null;
let stream = null;
let worker = null;
let workerReady = false;
let currentView = 'camera';

function saveDB() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }

function showToast(msg, duration = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function switchView(v) {
  currentView = v;
  document.getElementById('view-camera').classList.toggle('active', v === 'camera');
  document.getElementById('view-records').classList.toggle('active', v === 'records');
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && v === 'camera') || (i === 1 && v === 'records'));
  });
  if (v === 'records') renderRecords();
}

async function initWorker() {
  if (worker) return;
  setStatus('正在載入 OCR 引擎...', 'scanning');
  try {
    worker = await Tesseract.createWorker('eng', 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          document.getElementById('progress').style.width = (m.progress * 100).toFixed(0) + '%';
        }
      }
    });
    await worker.setParameters({
      tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-',
      preserve_interword_spaces: '0',
    });
    workerReady = true;
    setStatus('OCR 引擎就緒，可以辨識', 'success');
  } catch(e) {
    setStatus('OCR 引擎載入失敗', 'error');
  }
}

async function startCamera() {
  document.getElementById('cam-placeholder').style.display = 'none';
  document.getElementById('cam-live').style.display = 'block';
  document.getElementById('cam-ctrl').style.display = 'flex';
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    document.getElementById('video').srcObject = stream;
    setStatus('相機已啟動', 'success');
  } catch(e) {
    setStatus('無法取得相機權限', 'error');
  }
  initWorker();
}

async function capture() {
  if (!stream) { showToast('請先啟用相機'); return; }
  if (!workerReady) { showToast('OCR 引擎尚未就緒，請稍候'); return; }
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);

  // Crop to center region where plate should be
  const cw = canvas.width, ch = canvas.height;
  const cropX = cw * 0.1, cropY = ch * 0.3, cropW = cw * 0.8, cropH = ch * 0.4;
  const cropCanvas = document.createElement('canvas');
  cropCanvas.width = cropW; cropCanvas.height = cropH;
  const cctx = cropCanvas.getContext('2d');
  cctx.drawImage(canvas, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

  // Enhance contrast
  const imgData = cctx.getImageData(0, 0, cropW, cropH);
  const data = imgData.data;
  for (let i = 0; i < data.length; i += 4) {
    const gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
    const enhanced = gray > 128 ? 255 : 0;
    data[i] = data[i+1] = data[i+2] = enhanced;
  }
  cctx.putImageData(imgData, 0, 0);

  const shutter = document.getElementById('shutter');
  shutter.classList.add('scanning');
  setStatus('辨識中...', 'scanning');
  document.getElementById('progress').style.width = '0%';

  try {
    const { data: { text } } = await worker.recognize(cropCanvas);
    const plate = extractPlate(text);
    document.getElementById('progress').style.width = '100%';
    setTimeout(() => document.getElementById('progress').style.width = '0%', 800);
    shutter.classList.remove('scanning');
    if (plate) {
      showResult(plate);
    } else {
      setStatus('未辨識到台灣車牌格式，請重試', 'error');
    }
  } catch(e) {
    shutter.classList.remove('scanning');
    setStatus('辨識失敗，請重試', 'error');
  }
}

function extractPlate(text) {
  const cleaned = text.toUpperCase().replace(/[^A-Z0-9]/g, '');
  const patterns = [
    /[A-Z]{2,3}[0-9]{4}/,
    /[0-9]{2,4}[A-Z]{2,3}/,
    /[A-Z]{1,2}[0-9]{2,4}/,
    /[0-9]{3,4}[A-Z]{2}/,
  ];
  for (const p of patterns) {
    const m = cleaned.match(p);
    if (m) {
      let r = m[0];
      if (r.length > 3) r = r.slice(0, r.length - 4) + '-' + r.slice(-4);
      return r;
    }
  }
  return null;
}

function showResult(plate) {
  currentPlate = plate;
  document.getElementById('result-plate-num').textContent = plate;
  const noteAlert = document.getElementById('note-alert');
  const noteDisplay = document.getElementById('note-display');
  const noteInput = document.getElementById('note-input');
  const deleteBtn = document.getElementById('delete-btn');
  const saveBtn = document.getElementById('save-btn');

  if (db[plate]) {
    const record = db[plate];
    noteAlert.style.display = 'flex';
    noteAlert.className = 'result-note-badge has-note';
    noteAlert.textContent = '⚠️ 此車牌有備註';
    noteDisplay.style.display = 'block';
    noteDisplay.textContent = record.note || '（無備註文字）';
    noteInput.style.display = 'block';
    noteInput.value = record.note || '';
    saveBtn.textContent = '更新備註';
    deleteBtn.style.display = 'block';
    setStatus(`辨識完成：${plate}（有備註）`, 'success');
  } else {
    noteAlert.style.display = 'none';
    noteDisplay.style.display = 'none';
    noteInput.style.display = 'block';
    noteInput.value = '';
    saveBtn.textContent = '儲存備註';
    deleteBtn.style.display = 'none';
    setStatus(`辨識完成：${plate}`, 'success');
  }

  document.getElementById('result-card').classList.add('show');
  // Update sightings
  if (!db[plate]) db[plate] = { note: '', sightings: 0, first: Date.now(), last: Date.now() };
  db[plate].sightings = (db[plate].sightings || 0) + 1;
  db[plate].last = Date.now();
  saveDB();
}

function saveNote() {
  if (!currentPlate) return;
  const note = document.getElementById('note-input').value.trim();
  if (!db[currentPlate]) db[currentPlate] = { sightings: 1, first: Date.now() };
  db[currentPlate].note = note;
  db[currentPlate].last = Date.now();
  saveDB();
  showToast('✓ 備註已儲存');
  document.getElementById('note-display').textContent = note || '（無備註文字）';
  document.getElementById('note-display').style.display = note ? 'block' : 'none';
  document.getElementById('save-btn').textContent = '更新備註';
  document.getElementById('delete-btn').style.display = 'block';
  if (note) {
    document.getElementById('note-alert').style.display = 'flex';
    document.getElementById('note-alert').className = 'result-note-badge has-note';
    document.getElementById('note-alert').textContent = '⚠️ 此車牌有備註';
  }
}

function deleteRecord() {
  if (!currentPlate) return;
  if (!confirm(`確定要刪除 ${currentPlate} 的所有記錄？`)) return;
  delete db[currentPlate];
  saveDB();
  clearResult();
  showToast('已刪除記錄');
}

function clearResult() {
  document.getElementById('result-card').classList.remove('show');
  currentPlate = null;
  document.getElementById('note-input').value = '';
}

function setStatus(text, type = '') {
  document.getElementById('status-text').textContent = text;
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (type ? ' ' + type : '');
}

// RECORDS
function renderRecords() {
  const list = document.getElementById('record-list');
  const keys = Object.keys(db).sort((a, b) => (db[b].last || 0) - (db[a].last || 0));
  document.getElementById('records-count').textContent = `共 ${keys.length} 筆記錄`;
  if (keys.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🚗</div>
      <div class="empty-title">尚無記錄</div>
      <div class="empty-desc">使用相機辨識車牌後，<br>自動儲存到這裡</div>
    </div>`;
    return;
  }
  list.innerHTML = keys.map(plate => {
    const r = db[plate];
    const d = r.last ? new Date(r.last) : new Date();
    const dateStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    const note = r.note || '';
    return `<div class="record-item">
      <div>
        <div class="record-plate-num">${plate}</div>
        <div class="record-date">${dateStr} · 出現 ${r.sightings || 1} 次</div>
      </div>
      <div class="record-info">
        <div class="record-note ${note ? 'has-note' : ''}">${note || '（無備註）'}</div>
      </div>
      <div class="record-actions">
        <button class="icon-btn" onclick="editFromRecord('${plate}')" title="編輯">✏️</button>
        <button class="icon-btn" onclick="deleteFromRecord('${plate}')" title="刪除">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function editFromRecord(plate) {
  currentPlate = plate;
  switchView('camera');
  setTimeout(() => {
    showResultFromDB(plate);
  }, 100);
}

function showResultFromDB(plate) {
  currentPlate = plate;
  document.getElementById('result-plate-num').textContent = plate;
  const record = db[plate] || {};
  const noteAlert = document.getElementById('note-alert');
  const noteDisplay = document.getElementById('note-display');
  const noteInput = document.getElementById('note-input');
  noteAlert.style.display = 'none';
  noteDisplay.style.display = 'none';
  noteInput.style.display = 'block';
  noteInput.value = record.note || '';
  document.getElementById('save-btn').textContent = '更新備註';
  document.getElementById('delete-btn').style.display = 'block';
  document.getElementById('result-card').classList.add('show');
  setStatus(`編輯：${plate}`, 'success');
}

function deleteFromRecord(plate) {
  if (!confirm(`確定要刪除 ${plate} 的記錄？`)) return;
  delete db[plate];
  saveDB();
  renderRecords();
  showToast('已刪除');
}

function clearAllRecords() {
  if (Object.keys(db).length === 0) { showToast('沒有記錄'); return; }
  if (!confirm('確定要清除所有記錄？此操作無法復原')) return;
  db = {};
  saveDB();
  renderRecords();
  showToast('已清除所有記錄');
}
</script>
</body>
</html>
